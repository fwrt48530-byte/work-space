<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f3;--bg2:#fff;--txt:#1a1a1a;--border:#e5e4df;--blue:#2563eb;--bl:#eff6ff;--bt:#2563eb}
[data-theme="dark"]{--bg:#121212;--bg2:#1e1e1e;--txt:#e4e4e7;--border:#27272a;--bl:#1e3a5f;--bt:#60a5fa}
[data-theme="dim"]{--bg:#0f172a;--bg2:#1e293b;--txt:#f8fafc;--border:#334155;--bl:#1e3a5f;--bt:#7dd3fc}
html,body{min-height:100vh;font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;align-items:center;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:380px;max-width:94vw;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.logo{text-align:center;font-size:36px;margin-bottom:6px}
.card-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:4px}
.card-sub{text-align:center;font-size:13px;opacity:.5;margin-bottom:28px}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit;font-size:14px;outline:none;direction:rtl;transition:border-color .12s}
.fi:focus{border-color:var(--blue)}
.btn-main{width:100%;padding:11px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .12s}
.btn-main:hover{opacity:.88}
.switch-link{text-align:center;margin-top:18px;font-size:13px;opacity:.6}
.switch-link a{color:var(--bt);cursor:pointer;text-decoration:underline}
.err{color:#dc2626;font-size:12.5px;margin-top:4px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">✨</div>
  <div class="card-title" data-i18n="title">إنشاء حساب جديد</div>
  <div class="card-sub" data-i18n="subtitle">ابدأ رحلتك مع مساحة العمل</div>

  <div class="fl">
    <label data-i18n="field.fullName">الاسم الكامل</label>
    <input class="fi" type="text" id="name" placeholder="محمد أحمد" data-i18n-ph="field.fullName.ph">
  </div>
  <div class="fl">
    <label data-i18n="field.email">البريد الإلكتروني</label>
    <input class="fi" type="email" id="email" placeholder="example@email.com">
  </div>
  <div class="fl">
    <label data-i18n="field.password">كلمة المرور</label>
    <input class="fi" type="password" id="password" placeholder="6 أحرف على الأقل" data-i18n-ph="field.password.ph">
  </div>
  <div class="fl">
    <label data-i18n="field.confirmPassword">تأكيد كلمة المرور</label>
    <input class="fi" type="password" id="confirm" placeholder="أعد كتابة كلمة المرور" data-i18n-ph="field.confirmPassword.ph">
    <div class="err" id="err"></div>
  </div>

  <button class="btn-main" onclick="doRegister()" data-i18n="btn.register">إنشاء الحساب</button>

  <div class="switch-link">
    <span data-i18n="switch.haveAccount">لديك حساب بالفعل؟</span> <a onclick="goTo('تسجيل_الدخول.html')" data-i18n="switch.login">تسجيل الدخول</a>
  </div>
</div>

<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('app-theme')||'light');
window.addEventListener('message', e=>{
  if(e.data?.type==='change-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  if(e.data?.type==='change-lang') applyLang(e.data.lang);
});

const I18N = {
  ar: {
    'title':'إنشاء حساب جديد', 'subtitle':'ابدأ رحلتك مع مساحة العمل',
    'field.fullName':'الاسم الكامل', 'field.fullName.ph':'محمد أحمد',
    'field.email':'البريد الإلكتروني', 'field.password':'كلمة المرور', 'field.password.ph':'6 أحرف على الأقل',
    'field.confirmPassword':'تأكيد كلمة المرور', 'field.confirmPassword.ph':'أعد كتابة كلمة المرور',
    'btn.register':'إنشاء الحساب', 'switch.haveAccount':'لديك حساب بالفعل؟', 'switch.login':'تسجيل الدخول',
    'err.fillAll':'يرجى تعبئة جميع الحقول', 'err.passwordLen':'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'err.passwordMismatch':'كلمتا المرور غير متطابقتين'
  },
  en: {
    'title':'Create a new account', 'subtitle':'Start your journey with the workspace',
    'field.fullName':'Full Name', 'field.fullName.ph':'John Smith',
    'field.email':'Email', 'field.password':'Password', 'field.password.ph':'At least 6 characters',
    'field.confirmPassword':'Confirm Password', 'field.confirmPassword.ph':'Re-enter your password',
    'btn.register':'Create Account', 'switch.haveAccount':'Already have an account?', 'switch.login':'Log In',
    'err.fillAll':'Please fill in all fields', 'err.passwordLen':'Password must be at least 6 characters', 'err.passwordMismatch':'Passwords do not match'
  }
};
let curLang = localStorage.getItem('app-lang') || 'ar';
function t(key){ return (I18N[curLang] && I18N[curLang][key]) || key; }
function applyLang(l){
  curLang = l;
  document.documentElement.setAttribute('lang', l==='ar'?'ar':'en');
  document.documentElement.setAttribute('dir', l==='ar'?'rtl':'ltr');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.getAttribute('data-i18n-ph')); });
}
applyLang(curLang);

function doRegister(){
  const name    = document.getElementById('name').value.trim();
  const email   = document.getElementById('email').value.trim();
  const pass    = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const err     = document.getElementById('err');

  if(!name||!email||!pass){ err.textContent=t('err.fillAll'); err.classList.add('show'); return; }
  if(pass.length < 6){ err.textContent=t('err.passwordLen'); err.classList.add('show'); return; }
  if(pass !== confirm){ err.textContent=t('err.passwordMismatch'); err.classList.add('show'); return; }

  const acc = { name, email, password:pass, createdAt:new Date().toISOString() };
  localStorage.setItem('userAccount', JSON.stringify(acc));
  err.classList.remove('show');
  window.parent.postMessage({type:'login-success'}, '*');
}
function goTo(page){ window.parent.postMessage({type:'goto', page}, '*'); }
</script>
<script>
/* أمسك واسحب للتمرير في كل الاتجاهات (بالماوس) — drag-to-scroll */
(function(){
  var down=false, moved=false, sx=0, sy=0, elX=null, elY=null, baseL=0, baseT=0;
  var NODRAG='a,button,input,textarea,select,label,option,[contenteditable="true"],[draggable="true"],.no-drag';
  function scrollable(el, axis){
    while(el && el.nodeType===1 && el!==document.body && el!==document.documentElement){
      var s=getComputedStyle(el), o=(axis==='y'?s.overflowY:s.overflowX);
      var can=(o==='auto'||o==='scroll'||o==='overlay');
      var big=(axis==='y'? el.scrollHeight>el.clientHeight+1 : el.scrollWidth>el.clientWidth+1);
      if(can && big) return el;
      el=el.parentElement;
    }
    return axis==='y' ? (document.scrollingElement||document.documentElement) : null;
  }
  addEventListener('pointerdown',function(e){
    if(e.pointerType && e.pointerType!=='mouse') return;   /* اللمس يمرّر بشكل طبيعي */
    if(e.button!==0) return;
    if(e.target.closest && e.target.closest(NODRAG)) return;
    if(getComputedStyle(e.target).cursor==='text') return;
    down=true; moved=false; sx=e.clientX; sy=e.clientY;
    elY=scrollable(e.target,'y'); elX=scrollable(e.target,'x');
    baseT=elY?elY.scrollTop:0; baseL=elX?elX.scrollLeft:0;
  },true);
  addEventListener('pointermove',function(e){
    if(!down) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved){
      if(Math.abs(dx)<5 && Math.abs(dy)<5) return;
      moved=true;
      document.body.style.cursor='grabbing';
      document.body.style.userSelect='none';
    }
    if(e.cancelable) e.preventDefault();
    if(elY) elY.scrollTop=baseT-dy;
    if(elX) elX.scrollLeft=baseL-dx;
  },{passive:false,capture:true});
  function end(){
    if(!down) return;
    down=false;
    document.body.style.cursor='';
    document.body.style.userSelect='';
    if(moved){                       /* امنع النقرة الناتجة عن السحب */
      var sup=function(ev){ ev.stopPropagation(); ev.preventDefault(); removeEventListener('click',sup,true); };
      addEventListener('click',sup,true);
      setTimeout(function(){ removeEventListener('click',sup,true); },0);
    }
  }
  addEventListener('pointerup',end,true);
  addEventListener('pointercancel',end,true);
})();
</script>
<script>
/* حجم الخط الموحّد (font-scale) — يُطبّق إعداد "حجم الخط" من الإعدادات على كل الصفحات.
   الصفحة العليا فقط تُطبّق zoom؛ الصفحة داخل iframe يُصغّرها تكبير القوقعة تلقائياً. */
(function(){
  var M={small:0.85, normal:1, large:1.15};
  function cur(){ var v=localStorage.getItem('font-scale'); return M[v]?v:'normal'; }
  function apply(){
    if(window.top!==window.self) return;            /* مؤطّرة: القوقعة تتكفّل بالتصغير */
    var s=M[cur()]||1, de=document.documentElement;
    de.style.zoom=s;
    /* تعويض الارتفاع حتى لا يظهر فراغ أسفل الشاشة (zoom يتعارض مع 100vh) */
    de.style.height = s===1 ? '' : (100/s)+'vh';
    if(document.body) document.body.style.minHeight = s===1 ? '' : (100/s)+'vh';
  }
  if(document.body) apply(); else document.addEventListener('DOMContentLoaded',apply);
  window.addEventListener('storage', function(e){ if(e.key==='font-scale') apply(); });
})();
</script>
</body>
</html>
