<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملاحظاتي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f3;--bg2:#fff;--txt:#1a1a1a;--border:#e5e4df;--blue:#2563eb;--bl:#eff6ff;--bt:#2563eb;--green:#16a34a;--gl:#f0fdf4;--gt:#16a34a;--r:10px;--sh:0 1px 3px rgba(0,0,0,.08)}
[data-theme="dark"]{--bg:#121212;--bg2:#1e1e1e;--txt:#e4e4e7;--border:#27272a;--bl:#1e3a5f;--bt:#60a5fa;--gl:#14532d;--gt:#4ade80}
[data-theme="dim"]{--bg:#0f172a;--bg2:#1e293b;--txt:#f8fafc;--border:#334155;--bl:#1e3a5f;--bt:#7dd3fc;--gl:#14532d;--gt:#4ade80}
html,body{min-height:100vh;font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.side{background:var(--bg2);border-left:1px solid var(--border);padding:14px;display:flex;flex-direction:column;overflow-y:auto}
.main{padding:20px 28px;overflow-y:auto}
.side-title{font-size:13px;font-weight:700;opacity:.45;margin-bottom:8px;padding-right:4px}
.btn-new-note{width:100%;padding:9px;border:none;border-radius:9px;background:var(--blue);color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:14px}
.btn-new-note:hover{opacity:.88}
.search-box{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit;font-size:13px;outline:none;direction:rtl;margin-bottom:10px}
.search-box:focus{border-color:var(--blue)}
.group-item{padding:7px 10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.group-item:hover{background:var(--bg)}
.group-item.active{background:var(--bl);color:var(--bt);font-weight:600}
.group-count{font-size:11px;opacity:.5}
.btn-add-group{width:100%;padding:6px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--bt);font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px}

/* NOTES GRID / EDITOR */
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.notes-title{font-size:19px;font-weight:700}
.view-toggle{display:flex;gap:4px}
.view-btn{padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--txt);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s}
.view-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.notes-list{display:flex;flex-direction:column;gap:8px}

.note-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:box-shadow .12s,border-color .12s;
  position:relative
}
.note-card:hover{box-shadow:var(--sh);border-color:var(--blue)}
.note-card.list-mode{padding:12px 16px}
.note-card-title{font-size:14px;font-weight:700;margin-bottom:6px}
.note-card-preview{font-size:12.5px;opacity:.55;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.note-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.note-date{font-size:11px;opacity:.4}
.note-group-badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--bl);color:var(--bt);font-weight:500}
.note-del{position:absolute;top:8px;left:8px;border:none;background:none;cursor:pointer;font-size:13px;opacity:0;color:var(--txt);transition:opacity .12s}
.note-card:hover .note-del{opacity:.35}
.note-del:hover{opacity:.9 !important}

/* EDITOR */
.editor{display:none}
.editor.show{display:flex;flex-direction:column;height:calc(100vh - 40px)}
.ed-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ed-title-input{flex:1;min-width:200px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--txt);font-family:inherit;font-size:17px;font-weight:700;outline:none;direction:rtl}
.ed-title-input:focus{border-color:var(--blue)}
.ed-actions{display:flex;gap:6px}
.btn-save{padding:8px 18px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-save:hover{opacity:.88}
.btn-back{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--txt);font-family:inherit;font-size:13px;cursor:pointer}
.btn-back:hover{background:var(--bg)}
.ed-meta{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.ed-meta select{padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--txt);font-family:inherit;font-size:12.5px;outline:none;direction:rtl}
.ed-meta select:focus{border-color:var(--blue)}
.ed-date-lbl{font-size:12px;opacity:.45}
.ed-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0}
.ed-ta{width:100%;height:100%;padding:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;font-size:14px;resize:none;outline:none;direction:rtl;line-height:1.7}
.ed-ta:focus{border-color:var(--blue)}
.ed-preview{border:1px solid var(--border);border-radius:10px;padding:14px;overflow-y:auto;font-size:14px;line-height:1.8;background:var(--bg2)}
.ed-preview h1,.ed-preview h2,.ed-preview h3{margin:12px 0 6px;font-weight:700}
.ed-preview h1{font-size:20px}
.ed-preview h2{font-size:17px}
.ed-preview h3{font-size:15px}
.ed-preview ul,.ed-preview ol{padding-right:20px;margin:6px 0}
.ed-preview li{margin-bottom:3px}
.ed-preview code{background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}
.ed-preview pre{background:var(--bg);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0}
.ed-preview pre code{background:none;padding:0}
.ed-preview blockquote{border-right:3px solid var(--blue);padding-right:12px;margin:8px 0;opacity:.7}
.ed-preview strong{font-weight:700}
.ed-preview em{font-style:italic}
.ed-preview a{color:var(--bt)}
.ed-preview img{max-width:100%;border-radius:8px;margin:6px 0}
.empty-notes{text-align:center;padding:80px 20px;opacity:.35}
.empty-notes .ic{font-size:56px;margin-bottom:14px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:22px;width:340px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;font-size:17px;cursor:pointer;opacity:.5;color:var(--txt)}
.fl{margin-bottom:10px}
.fl label{display:block;font-size:12px;font-weight:600;margin-bottom:4px}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit;font-size:13.5px;outline:none;direction:rtl}
.fi:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:12px}
.btn-p{flex:1;padding:9px;border:none;border-radius:9px;background:var(--blue);color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer}
.btn-sec{padding:9px 14px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--txt);font-family:inherit;font-size:13.5px;cursor:pointer}
@media(max-width:700px){.layout{grid-template-columns:1fr}.side{display:none}.ed-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
  <div class="side">
    <button class="btn-new-note" onclick="newNote()">+ <span data-i18n="btn.newNote">ملاحظة جديدة</span></button>
    <input class="search-box" id="search" placeholder="بحث…" data-i18n-ph="search.ph" oninput="renderNotes()">
    <div class="side-title" data-i18n="side.groups">المجموعات</div>
    <div class="group-item active" onclick="filterGroup('',this)">
      <span>📁 <span data-i18n="filter.all">الكل</span></span>
      <span class="group-count" id="all-count">0</span>
    </div>
    <div id="groups-side"></div>
    <button class="btn-add-group" onclick="openGroupModal()">+ <span data-i18n="btn.newGroup">مجموعة جديدة</span></button>
  </div>

  <div class="main">
    <!-- LIST VIEW -->
    <div id="list-view">
      <div class="notes-header">
        <div class="notes-title" id="view-title" data-i18n="title.allNotes">كل الملاحظات</div>
        <div class="view-toggle">
          <button class="view-btn active" id="vbtn-grid" onclick="setView('grid')">⊞ <span data-i18n="view.grid">شبكة</span></button>
          <button class="view-btn" id="vbtn-list" onclick="setView('list')">☰ <span data-i18n="view.list">قائمة</span></button>
        </div>
      </div>
      <div id="notes-container"></div>
    </div>

    <!-- EDITOR -->
    <div class="editor" id="editor">
      <div class="ed-toolbar">
        <input class="ed-title-input" id="ed-title" placeholder="عنوان الملاحظة…" data-i18n-ph="field.noteTitle.ph" oninput="liveSaveNote()">
        <div class="ed-actions">
          <button class="btn-save" onclick="closeEditor()" data-i18n="btn.done">تم ✓</button>
          <button class="btn-back" onclick="closeEditor()" data-i18n="btn.back">← رجوع</button>
        </div>
      </div>
      <div class="ed-meta">
        <select id="ed-group" onchange="liveSaveNote()"><option value="" data-i18n="field.noGroup">— بلا مجموعة —</option></select>
        <span class="ed-date-lbl" id="ed-date"></span>
      </div>
      <div class="ed-body">
        <textarea class="ed-ta" id="ed-ta" placeholder="اكتب ملاحظتك هنا… (Markdown مدعوم)" data-i18n-ph="field.noteBody.ph" oninput="updatePreview();liveSaveNote()"></textarea>
        <div class="ed-preview" id="ed-preview"></div>
      </div>
    </div>
  </div>
</div>

<!-- GROUP MODAL -->
<div class="overlay" id="group-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" data-i18n="modal.newGroup">مجموعة جديدة</div><button class="modal-close" onclick="closeModals()">✕</button></div>
    <div class="fl"><label data-i18n="field.groupName">اسم المجموعة</label><input class="fi" id="g-name" placeholder="مثال: العمل / الدراسة" data-i18n-ph="field.groupName.ph"></div>
    <div class="modal-actions">
      <button class="btn-p" onclick="saveGroup()" data-i18n="btn.save">حفظ</button>
      <button class="btn-sec" onclick="closeModals()" data-i18n="btn.cancel">إلغاء</button>
    </div>
  </div>
</div>

<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('app-theme')||'light');
window.addEventListener('message', e=>{
  if(e.data?.type==='change-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  if(e.data?.type==='change-lang') applyLang(e.data.lang);
});

// ── اللغة ──
const I18N = {
  ar: {
    'btn.newNote':'ملاحظة جديدة', 'search.ph':'بحث…', 'side.groups':'المجموعات', 'filter.all':'الكل', 'btn.newGroup':'مجموعة جديدة',
    'title.allNotes':'كل الملاحظات', 'view.grid':'شبكة', 'view.list':'قائمة',
    'field.noteTitle.ph':'عنوان الملاحظة…', 'btn.done':'تم ✓', 'btn.back':'← رجوع', 'field.noGroup':'— بلا مجموعة —',
    'field.noteBody.ph':'اكتب ملاحظتك هنا… (Markdown مدعوم)', 'modal.newGroup':'مجموعة جديدة',
    'field.groupName':'اسم المجموعة', 'field.groupName.ph':'مثال: العمل / الدراسة', 'btn.save':'حفظ', 'btn.cancel':'إلغاء',
    'note.untitled':'بلا عنوان', 'note.lastEdit':'آخر تعديل:', 'note.saved':'تم الحفظ ✓',
    'empty.noNotes':'لا توجد ملاحظات', 'group':'مجموعة'
  },
  en: {
    'btn.newNote':'New Note', 'search.ph':'Search…', 'side.groups':'Groups', 'filter.all':'All', 'btn.newGroup':'New Group',
    'title.allNotes':'All Notes', 'view.grid':'Grid', 'view.list':'List',
    'field.noteTitle.ph':'Note title…', 'btn.done':'Done ✓', 'btn.back':'← Back', 'field.noGroup':'— No group —',
    'field.noteBody.ph':'Write your note here… (Markdown supported)', 'modal.newGroup':'New Group',
    'field.groupName':'Group Name', 'field.groupName.ph':'e.g. Work / Study', 'btn.save':'Save', 'btn.cancel':'Cancel',
    'note.untitled':'Untitled', 'note.lastEdit':'Last edited:', 'note.saved':'Saved ✓',
    'empty.noNotes':'No notes', 'group':'group'
  }
};
let curLang = localStorage.getItem('app-lang') || 'ar';
function t(key){ return (I18N[curLang] && I18N[curLang][key]) || key; }
function applyLang(l){
  curLang = l;
  document.documentElement.setAttribute('lang', l==='ar'?'ar':'en');
  document.documentElement.setAttribute('dir', l==='ar'?'rtl':'ltr');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  renderAll();
}

const KEY_N='diary-notes', KEY_G='diary-groups';
let curGroup='', viewMode='grid', editId=null;

function getNotes(){ return JSON.parse(localStorage.getItem(KEY_N)||'[]'); }
function getGroups(){ return JSON.parse(localStorage.getItem(KEY_G)||'[]'); }
function saveNotes(n){ localStorage.setItem(KEY_N,JSON.stringify(n)); }
function saveGroupsData(g){ localStorage.setItem(KEY_G,JSON.stringify(g)); }

function renderAll(){ renderGroups(); renderNotes(); }
function renderGroups(){
  const notes=getNotes(), groups=getGroups();
  document.getElementById('all-count').textContent=notes.length;
  document.getElementById('groups-side').innerHTML=groups.map(g=>{
    const cnt=notes.filter(n=>n.group===g.id).length;
    return `<div class="group-item${curGroup===g.id?' active':''}" onclick="filterGroup('${g.id}',this)">
      <span>📁 ${esc(g.name)}</span>
      <span class="group-count">${cnt} <button onclick="event.stopPropagation();deleteGroup('${g.id}')" style="border:none;background:none;cursor:pointer;font-size:11px;opacity:.35;color:var(--txt)">✕</button></span>
    </div>`;
  }).join('');
  // Group select in editor
  const sel=document.getElementById('ed-group');
  const cur=sel.value;
  sel.innerHTML=`<option value="">${t('field.noGroup')}</option>`;
  groups.forEach(g=>{ const o=document.createElement('option'); o.value=g.id; o.textContent=g.name; if(g.id===cur) o.selected=true; sel.appendChild(o); });
}
function renderNotes(){
  const notes=getNotes(), groups=getGroups();
  const q=(document.getElementById('search').value||'').toLowerCase();
  let filtered=notes.filter(n=>!n.deleted);
  if(curGroup) filtered=filtered.filter(n=>n.group===curGroup);
  if(q) filtered=filtered.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q));
  filtered.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));
  document.getElementById('view-title').textContent=curGroup?(getGroups().find(g=>g.id===curGroup)?.name||t('group')):t('title.allNotes');
  const container=document.getElementById('notes-container');
  if(!filtered.length){
    container.innerHTML=`<div class="empty-notes"><div class="ic">📓</div><div>${t('empty.noNotes')}</div></div>`;
    return;
  }
  const cls=viewMode==='grid'?'notes-grid':'notes-list';
  const g=groups;
  container.innerHTML=`<div class="${cls}">${filtered.map(n=>{
    const grp=g.find(gr=>gr.id===n.group);
    const preview=n.content.replace(/[#*`_\[\]]/g,'').substring(0,120);
    const date=new Date(n.updatedAt).toLocaleDateString(curLang==='ar'?'ar':'en-US',{day:'numeric',month:'short',year:'numeric'});
    return `<div class="note-card${viewMode==='list'?' list-mode':''}" onclick="openEditor('${n.id}')">
      <button class="note-del" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
      <div class="note-card-title">${esc(n.title||t('note.untitled'))}</div>
      <div class="note-card-preview">${esc(preview)}</div>
      <div class="note-card-footer">
        <span class="note-date">${date}</span>
        ${grp?`<span class="note-group-badge">${esc(grp.name)}</span>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function filterGroup(id, el){
  curGroup=id;
  document.querySelectorAll('.group-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderNotes();
}
function setView(v){
  viewMode=v;
  document.getElementById('vbtn-grid').classList.toggle('active',v==='grid');
  document.getElementById('vbtn-list').classList.toggle('active',v==='list');
  renderNotes();
}

function newNote(){
  editId=null;
  document.getElementById('ed-title').value='';
  document.getElementById('ed-ta').value='';
  document.getElementById('ed-preview').innerHTML='';
  document.getElementById('ed-group').value=curGroup||'';
  document.getElementById('ed-date').textContent='';
  showEditor();
  setTimeout(()=>document.getElementById('ed-title').focus(),50);
}
function openEditor(id){
  const note=getNotes().find(n=>n.id===id);
  if(!note) return;
  editId=id;
  document.getElementById('ed-title').value=note.title||'';
  document.getElementById('ed-ta').value=note.content||'';
  document.getElementById('ed-group').value=note.group||'';
  document.getElementById('ed-date').textContent=t('note.lastEdit')+' '+new Date(note.updatedAt).toLocaleDateString(curLang==='ar'?'ar':'en-US');
  updatePreview();
  showEditor();
}
function showEditor(){ document.getElementById('list-view').style.display='none'; document.getElementById('editor').classList.add('show'); }
function closeEditor(){ document.getElementById('list-view').style.display=''; document.getElementById('editor').classList.remove('show'); renderAll(); }

// حفظ فوري مع كل حرف يُكتب حتى لا تُفقد الملاحظة إذا انتقلت لصفحة أخرى قبل الحفظ اليدوي
function liveSaveNote(){
  const title=document.getElementById('ed-title').value.trim();
  const content=document.getElementById('ed-ta').value;
  const group=document.getElementById('ed-group').value;
  const notes=getNotes();
  const now=new Date().toISOString();
  if(editId){
    const n=notes.find(n=>n.id===editId);
    if(n){ n.title=title||t('note.untitled'); n.content=content; n.group=group; n.updatedAt=now; saveNotes(notes); document.getElementById('ed-date').textContent=t('note.saved'); }
  } else if(title || content.trim()){
    const n={id:'n'+Date.now(), title:title||t('note.untitled'), content, group, createdAt:now, updatedAt:now, deleted:false};
    notes.push(n);
    editId=n.id;
    saveNotes(notes);
    document.getElementById('ed-date').textContent=t('note.saved');
  }
}
function deleteNote(id){
  const notes=getNotes();
  const n=notes.find(n=>n.id===id);
  if(n) n.deleted=true;
  saveNotes(notes); renderNotes();
}

// Simple Markdown renderer
function updatePreview(){
  let md=document.getElementById('ed-ta').value;
  // Code blocks
  md=md.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  md=md.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Headings
  md=md.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  md=md.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  md=md.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Bold/italic
  md=md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  md=md.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Lists
  md=md.replace(/^- (.+)$/gm,'<li>$1</li>');
  md=md.replace(/(<li>.*<\/li>(\n|$))+/g,'<ul>$&</ul>');
  // Blockquote
  md=md.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // Images
  md=md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  // Links
  md=md.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Line breaks
  md=md.replace(/\n\n/g,'<br><br>');
  md=md.replace(/\n/g,'<br>');
  document.getElementById('ed-preview').innerHTML=md;
}

function openGroupModal(){ document.getElementById('g-name').value=''; document.getElementById('group-modal').classList.add('show'); setTimeout(()=>document.getElementById('g-name').focus(),50); }
function saveGroup(){
  const name=document.getElementById('g-name').value.trim();
  if(!name) return;
  const groups=getGroups();
  groups.push({id:'g'+Date.now(),name});
  saveGroupsData(groups); closeModals(); renderAll();
}
function deleteGroup(id){ saveGroupsData(getGroups().filter(g=>g.id!==id)); if(curGroup===id){curGroup='';document.querySelector('.group-item').classList.add('active');} renderAll(); }
function closeModals(){ document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show')); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

<script>
/* إغلاق النافذة المنبثقة بالضغط خارجها (على الخلفية) بدل زر ✕ */
(function(){
  function bind(ov){
    var down=false;
    ov.addEventListener('pointerdown',function(e){ down=(e.target===ov); });
    ov.addEventListener('click',function(e){
      if(e.target===ov && down){
        var btn=ov.querySelector('.modal-close, .ch-close');
        if(btn){ btn.click(); } else { ov.classList.remove('show'); }
      }
    });
  }
  document.querySelectorAll('.overlay, #checkin-overlay').forEach(bind);
})();
</script>
<script>
/* أمسك واسحب للتمرير في كل الاتجاهات (بالماوس) — drag-to-scroll */
(function(){
  var down=false, moved=false, sx=0, sy=0, elX=null, elY=null, baseL=0, baseT=0;
  var NODRAG='a,button,input,textarea,select,label,option,[contenteditable="true"],[draggable="true"],.no-drag';
  function scrollable(el, axis){
    while(el && el.nodeType===1 && el!==document.body && el!==document.documentElement){
      var s=getComputedStyle(el), o=(axis==='y'?s.overflowY:s.overflowX);
      var can=(o==='auto'||o==='scroll'||o==='overlay');
      var big=(axis==='y'? el.scrollHeight>el.clientHeight+1 : el.scrollWidth>el.clientWidth+1);
      if(can && big) return el;
      el=el.parentElement;
    }
    return axis==='y' ? (document.scrollingElement||document.documentElement) : null;
  }
  addEventListener('pointerdown',function(e){
    if(e.pointerType && e.pointerType!=='mouse') return;   /* اللمس يمرّر بشكل طبيعي */
    if(e.button!==0) return;
    if(e.target.closest && e.target.closest(NODRAG)) return;
    if(getComputedStyle(e.target).cursor==='text') return;
    down=true; moved=false; sx=e.clientX; sy=e.clientY;
    elY=scrollable(e.target,'y'); elX=scrollable(e.target,'x');
    baseT=elY?elY.scrollTop:0; baseL=elX?elX.scrollLeft:0;
  },true);
  addEventListener('pointermove',function(e){
    if(!down) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved){
      if(Math.abs(dx)<5 && Math.abs(dy)<5) return;
      moved=true;
      document.body.style.cursor='grabbing';
      document.body.style.userSelect='none';
    }
    if(e.cancelable) e.preventDefault();
    if(elY) elY.scrollTop=baseT-dy;
    if(elX) elX.scrollLeft=baseL-dx;
  },{passive:false,capture:true});
  function end(){
    if(!down) return;
    down=false;
    document.body.style.cursor='';
    document.body.style.userSelect='';
    if(moved){                       /* امنع النقرة الناتجة عن السحب */
      var sup=function(ev){ ev.stopPropagation(); ev.preventDefault(); removeEventListener('click',sup,true); };
      addEventListener('click',sup,true);
      setTimeout(function(){ removeEventListener('click',sup,true); },0);
    }
  }
  addEventListener('pointerup',end,true);
  addEventListener('pointercancel',end,true);
})();
</script>
<script>
/* حجم الخط الموحّد (font-scale) — يُطبّق إعداد "حجم الخط" من الإعدادات على كل الصفحات.
   الصفحة العليا فقط تُطبّق zoom؛ الصفحة داخل iframe يُصغّرها تكبير القوقعة تلقائياً. */
(function(){
  var M={small:0.85, normal:1, large:1.15};
  function cur(){ var v=localStorage.getItem('font-scale'); return M[v]?v:'normal'; }
  function apply(){
    if(window.top!==window.self) return;            /* مؤطّرة: القوقعة تتكفّل بالتصغير */
    var s=M[cur()]||1, de=document.documentElement;
    de.style.zoom=s;
    /* تعويض الارتفاع حتى لا يظهر فراغ أسفل الشاشة (zoom يتعارض مع 100vh) */
    de.style.height = s===1 ? '' : (100/s)+'vh';
    if(document.body) document.body.style.minHeight = s===1 ? '' : (100/s)+'vh';
  }
  if(document.body) apply(); else document.addEventListener('DOMContentLoaded',apply);
  window.addEventListener('storage', function(e){ if(e.key==='font-scale') apply(); });
})();
</script>
